<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我慢記録 - Ver 14.0</title>
    <style>
        :root { --main-bg: #ffffff; --sub-bg: #f8f9fa; --border-color: #dee2e6; --primary-btn: #28a745; --quick-btn: #f1f3f5; --text-color: #212529; --overlay-bg: rgba(0,0,0,0.8); }
        body { font-family: -apple-system, sans-serif; background-color: #ececec; margin: 0; padding: 15px 10px; color: var(--text-color); }
        .app-container { background: var(--main-bg); border-radius: 12px; max-width: 400px; margin: 0 auto; overflow: hidden; box-shadow: 0 8px 20px rgba(0,0,0,0.1); min-height: 500px; display: flex; flex-direction: column; }
        .header { background: #343a40; color: white; padding: 15px; font-weight: bold; text-align: center; font-size: 1.1rem; }
        .content { padding: 20px; flex-grow: 1; }
        .hidden { display: none !important; }
        button { width: 100%; padding: 16px; border-radius: 8px; border: none; font-size: 1rem; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-main { background-color: var(--primary-btn); color: white; }
        .btn-sub { background-color: #6c757d; color: white; }
        .btn-outline { background-color: transparent; border: 2px solid var(--border-color); color: #666; font-size: 0.9rem; }
        .quick-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .btn-quick { background: var(--quick-btn); border: 2px solid var(--border-color); padding: 15px 10px; border-radius: 8px; font-weight: bold; cursor: pointer; text-align: center; }
        .btn-quick span { display: block; font-size: 0.75rem; color: #777; font-weight: normal; }
        .progress-container { background: #eee; border-radius: 10px; height: 20px; width: 100%; margin: 15px 0; overflow: hidden; }
        .progress-bar { background: var(--primary-btn); height: 100%; width: 0%; transition: width 0.5s ease; }
        .btn-del-item { width: auto; padding: 5px 8px; margin: 0; background: #ffeded; color: #dc3545; font-size: 0.7rem; border-radius: 4px; font-weight: bold; }
        
        /* オンボーディング */
        .onboarding-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--overlay-bg); color: white; z-index: 2000; display: flex; justify-content: center; align-items: center; }
        .onboarding-card { background: white; color: var(--text-color); border-radius: 16px; padding: 30px; width: 85%; max-width: 320px; text-align: center; }
    </style>
</head>
<body>

<div id="onboardingPage" class="onboarding-overlay hidden">
    <div class="onboarding-card">
        <h2 style="margin-top:0; color:var(--primary-btn);">我慢貯金の使いかた</h2>
        <p style="font-size:0.9rem; text-align:left;">1. 「設定」で目標とボタンを作成<br>2. 我慢したらボタンをタップ<br>3. 「進捗」で達成率を確認</p>
        <button class="btn-main" onclick="finishOnboarding()">はじめる</button>
    </div>
</div>

<div class="app-container">
    <div class="header" id="pageTitle">我慢を登録</div>
    <div class="content">
        <div id="page1">
            <div class="quick-grid" id="quickButtonsArea"></div>
            <button class="btn-main" onclick="showPage('page5')" style="background:#007bff; margin-bottom: 10px;">📊 履歴を詳しく見る</button>
            <button class="btn-sub" onclick="showPage('page3')">集計・進捗</button>
            <button class="btn-outline" onclick="showPage('page4')">設定</button>
        </div>

        <div id="page2" class="hidden" style="text-align:center;">
            <div style="font-size:5rem; color:var(--primary-btn); margin:20px 0;">✔️</div>
            <h2 id="saveMsgTitle">登録完了</h2>
            <p id="saveMsgBody" style="color:#666;"></p>
            <button class="btn-main" onclick="showPage('page1')">続けて登録</button>
        </div>

        <div id="page3" class="hidden">
            <div style="background:#f8f9fa; padding:20px; border-radius:8px; text-align:center; border:1px solid #ddd;">
                <span style="font-size:0.9rem;">累計貯金額</span>
                <span style="display:block; font-size:2.2rem; font-weight:bold; color:var(--primary-btn);" id="grandTotal">0円</span>
            </div>
            <div style="padding:15px 0;">
                <div style="display:flex; justify-content:space-between; font-size:0.8rem; font-weight:bold;">
                    <span>目標：<span id="displayTarget">0</span>円</span>
                    <span>あと <span id="displayRemaining">0</span>円</span>
                </div>
                <div class="progress-container"><div class="progress-bar" id="progressBar"></div></div>
                <p style="text-align:center; font-weight:bold;">達成率: <span id="progressPercent">0</span>%</p>
            </div>
            <button class="btn-sub" onclick="showPage('page1')">戻る</button>
        </div>

        <div id="page4" class="hidden">
            <div style="margin-bottom:20px;">
                <label style="font-size:0.8rem; font-weight:bold;">🎯 目標金額</label>
                <div style="display:flex; gap:10px; margin-top:5px;">
                    <input type="number" id="targetInput" style="flex:1; padding:12px; border:1px solid #ddd; border-radius:6px;">
                    <button class="btn-main" onclick="updateTarget()" style="width:auto; margin:0; padding:10px;">設定</button>
                </div>
            </div>
            <div style="margin-bottom:20px;">
                <label style="font-size:0.8rem; font-weight:bold;">＋ ボタン追加</label>
                <input type="text" id="newBtnName" placeholder="名前" style="width:100%; padding:12px; margin-top:5px; border:1px solid #ddd; border-radius:6px; box-sizing:border-box;">
                <input type="number" id="newBtnAmount" placeholder="金額" style="width:100%; padding:12px; margin-top:5px; border:1px solid #ddd; border-radius:6px; box-sizing:border-box;">
                <button class="btn-main" onclick="addQuickButton()">追加</button>
            </div>
            <div id="manageListArea"></div>
            <button class="btn-sub" onclick="showPage('page1')">戻る</button>
        </div>

        <div id="page5" class="hidden">
            <div style="display:flex; gap:5px; margin-bottom:15px;">
                <button class="btn-tab" onclick="renderHistory('day')">今日</button>
                <button class="btn-tab" onclick="renderHistory('week')">1週間</button>
                <button class="btn-tab" onclick="renderHistory('month')">1ヶ月</button>
            </div>
            <div id="historyListArea" style="height:250px; overflow-y:auto; border:1px solid #eee; background:#fff;"></div>
            <div style="text-align:right; font-weight:bold; margin-top:10px;">合計: <span id="periodTotal">0</span>円</div>
            <button class="btn-sub" onclick="showPage('page1')" style="margin-top:20px;">戻る</button>
        </div>
    </div>
</div>

<script>
    // データ初期化
    let total = parseInt(localStorage.getItem('mySavingTotal')) || 0;
    let targetAmount = parseInt(localStorage.getItem('myTargetAmount')) || 0;
    let history = JSON.parse(localStorage.getItem('mySavingHistory')) || [];
    let quickButtons = JSON.parse(localStorage.getItem('myQuickButtons')) || [
        { name: 'スタバ', amount: 650 },
        { name: 'コンビニ', amount: 300 }
    ];

    // 画面切り替え（絶対動くシンプル版）
    function showPage(pageId) {
        const ids = ['page1', 'page2', 'page3', 'page4', 'page5'];
        ids.forEach(id => {
            const el = document.getElementById(id);
            if (el) el.classList.add('hidden');
        });
        document.getElementById(pageId).classList.remove('hidden');

        if(pageId === 'page1') renderQuickButtons();
        if(pageId === 'page3') updateProgressUI();
        if(pageId === 'page4') renderManageList();
        if(pageId === 'page5') renderHistory('day');
    }

    // オンボーディング
    function finishOnboarding() {
        localStorage.setItem('gamanOnboardingSeen', 'true');
        document.getElementById('onboardingPage').classList.add('hidden');
    }

    function updateTarget() {
        targetAmount = parseInt(document.getElementById('targetInput').value) || 0;
        localStorage.setItem('myTargetAmount', targetAmount);
        alert("設定しました");
        showPage('page3');
    }

    function updateProgressUI() {
        document.getElementById('grandTotal').innerText = total.toLocaleString() + "円";
        document.getElementById('displayTarget').innerText = targetAmount.toLocaleString();
        document.getElementById('displayRemaining').innerText = (Math.max(0, targetAmount - total)).toLocaleString();
        const percent = targetAmount > 0 ? Math.min(100, Math.floor((total / targetAmount) * 100)) : 0;
        document.getElementById('progressPercent').innerText = percent;
        document.getElementById('progressBar').style.width = percent + "%";
    }

    function renderHistory(period) {
        const now = new Date();
        const filtered = history.filter(i => {
            const d = new Date(i.timestamp);
            if(period === 'day') return d.toDateString() === now.toDateString();
            if(period === 'week') return i.timestamp >= (now.getTime() - 7*24*60*60*1000);
            return i.timestamp >= (now.getTime() - 30*24*60*60*1000);
        });
        document.getElementById('periodTotal').innerText = filtered.reduce((s,i)=>s+i.amount,0).toLocaleString();
        document.getElementById('historyListArea').innerHTML = filtered.map(i => `
            <div style="padding:10px; border-bottom:1px solid #eee; display:flex; justify-content:space-between;">
                <span>${i.name}</span>
                <span>+${i.amount}円 <button onclick="deleteItem(${i.timestamp})" style="width:auto; padding:2px 5px; margin:0; background:#eee;">✕</button></span>
            </div>
        `).join('') || '記録なし';
    }

    function deleteItem(ts) {
        const idx = history.findIndex(i => i.timestamp === ts);
        if(idx > -1) {
            total -= history[idx].amount;
            history.splice(idx, 1);
            localStorage.setItem('mySavingTotal', total);
            localStorage.setItem('mySavingHistory', JSON.stringify(history));
            renderHistory('day');
        }
    }

    function renderQuickButtons() {
        document.getElementById('quickButtonsArea').innerHTML = quickButtons.map(btn => `
            <div class="btn-quick" onclick="saveData('${btn.name}', ${btn.amount})">${btn.name}<span>${btn.amount}円</span></div>
        `).join('');
    }

    function saveData(name, amt) {
        total += amt;
        history.unshift({ name, amount: amt, timestamp: new Date().getTime() });
        localStorage.setItem('mySavingTotal', total);
        localStorage.setItem('mySavingHistory', JSON.stringify(history));
        document.getElementById('saveMsgBody').innerText = name + "(" + amt + "円)";
        showPage('page2');
    }

    function renderManageList() {
        document.getElementById('manageListArea').innerHTML = quickButtons.map((btn, idx) => `
            <div style="display:flex; justify-content:space-between; padding:5px;"><span>${btn.name}</span><button onclick="delBtn(${idx})" style="width:auto; padding:2px 5px;">削除</button></div>
        `).join('');
    }

    function addQuickButton() {
        const n = document.getElementById('newBtnName').value;
        const a = parseInt(document.getElementById('newBtnAmount').value);
        if(n && a) { quickButtons.push({name:n, amount:a}); localStorage.setItem('myQuickButtons', JSON.stringify(quickButtons)); showPage('page4'); }
    }

    function delBtn(idx) { quickButtons.splice(idx, 1); localStorage.setItem('myQuickButtons', JSON.stringify(quickButtons)); renderManageList(); }

    // 起動！
    if (!localStorage.getItem('gamanOnboardingSeen')) {
        document.getElementById('onboardingPage').classList.remove('hidden');
    }
    showPage('page1');
</script>
</body>
</html>
