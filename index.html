<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我慢記録 - Ver 17.0</title>
    <style>
        :root { --main-bg: #ffffff; --sub-bg: #f8f9fa; --border-color: #dee2e6; --primary-btn: #28a745; --quick-btn: #f1f3f5; --text-color: #212529; --overlay-bg: rgba(0,0,0,0.8); }
        body { font-family: -apple-system, sans-serif; background-color: #ececec; margin: 0; padding: 15px 10px; color: var(--text-color); }
        .app-container { background: var(--main-bg); border-radius: 12px; max-width: 400px; margin: 0 auto; overflow: hidden; box-shadow: 0 8px 20px rgba(0,0,0,0.1); min-height: 500px; display: flex; flex-direction: column; }
        .header { background: #343a40; color: white; padding: 15px; font-weight: bold; text-align: center; font-size: 1.1rem; }
        .content { padding: 20px; flex-grow: 1; }
        .hidden { display: none !important; }
        button { width: 100%; padding: 16px; border-radius: 8px; border: none; font-size: 1rem; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-main { background-color: var(--primary-btn); color: white; }
        .btn-sub { background-color: #6c757d; color: white; }
        .btn-outline { background-color: transparent; border: 2px solid var(--border-color); color: #666; font-size: 0.9rem; }
        
        /* ドーナツグラフ */
        .chart-container { position: relative; width: 180px; height: 180px; margin: 0 auto 15px auto; }
        .chart-svg { transform: rotate(-90deg); width: 100%; height: 100%; }
        .chart-bg { fill: none; stroke: #eee; stroke-width: 8; }
        .chart-progress { fill: none; stroke: var(--primary-btn); stroke-width: 8; stroke-linecap: round; stroke-dasharray: 251.2; stroke-dashoffset: 251.2; transition: stroke-dashoffset 0.8s ease-out; }
        .chart-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; width: 100%; }
        .chart-total { display: block; font-size: 1.4rem; font-weight: bold; }
        
        /* 自由記入エリアのスタイル */
        .manual-entry-card { background: var(--sub-bg); border: 1px solid var(--border-color); border-radius: 10px; padding: 15px; margin-bottom: 20px; }
        .manual-input-group { display: flex; gap: 8px; margin-bottom: 10px; }
        .manual-input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 0.9rem; min-width: 0; }
        .btn-manual-save { width: auto; padding: 10px 15px; margin: 0; background: #343a40; color: white; font-size: 0.8rem; flex-shrink: 0; }

        .quick-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .btn-quick { background: var(--quick-btn); border: 2px solid var(--border-color); padding: 12px 5px; border-radius: 8px; font-weight: bold; cursor: pointer; text-align: center; font-size: 0.9rem; }
        .btn-quick span { display: block; font-size: 0.7rem; color: #777; font-weight: normal; }
        
        .history-item { padding: 12px 10px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .item-info { display: flex; flex-direction: column; }
        .item-date { font-size: 0.7rem; color: #888; }
        .item-name { font-weight: bold; }
        .btn-del-mini { background: #fdf2f2; color: #dc3545; border: 1px solid #fee2e2; padding: 4px 8px; font-size: 0.7rem; border-radius: 4px; }
        .progress-container { background: #eee; border-radius: 10px; height: 10px; width: 100%; margin: 10px 0; overflow: hidden; }
        .progress-bar { background: var(--primary-btn); height: 100%; width: 0%; transition: width 0.5s ease; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header" id="pageTitle">我慢を登録</div>
    <div class="content">
        <div id="page1">
            <div class="chart-container">
                <svg class="chart-svg" viewBox="0 0 100 100">
                    <circle class="chart-bg" cx="50" cy="50" r="40"></circle>
                    <circle id="donutCircle" class="chart-progress" cx="50" cy="50" r="40"></circle>
                </svg>
                <div class="chart-text">
                    <span id="donutTotal" class="chart-total">0円</span>
                    <span id="donutPercent" style="font-size:0.75rem; color:#666;">達成率 0%</span>
                </div>
            </div>

            <div class="manual-entry-card">
                <div style="font-size: 0.75rem; font-weight: bold; color: #666; margin-bottom: 8px;">✎ その場ですぐ記録</div>
                <div class="manual-input-group">
                    <input type="text" id="manualName" class="manual-input" placeholder="項目名">
                    <input type="number" id="manualAmount" class="manual-input" placeholder="金額">
                </div>
                <button class="btn-manual-save" onclick="saveManualData()">登録</button>
            </div>

            <div class="quick-grid" id="quickButtonsArea"></div>
            
            <button class="btn-main" onclick="showPage('page5')" style="background:#007bff; margin-bottom: 10px;">📊 履歴・詳細</button>
            <div style="display:flex; gap:10px;">
                <button class="btn-sub" onclick="showPage('page3')" style="margin-top:0; flex:1;">進捗</button>
                <button class="btn-outline" onclick="showPage('page4')" style="margin-top:0; flex:1;">設定</button>
            </div>
        </div>

        <div id="page2" class="hidden" style="text-align:center;">
            <div style="font-size:5rem; color:var(--primary-btn); margin:20px 0;">✔️</div>
            <h2>ナイス我慢！</h2>
            <p id="saveMsgBody" style="color:#666;"></p>
            <button class="btn-main" onclick="showPage('page1')">ホームに戻る</button>
        </div>

        <div id="page3" class="hidden">
            <div style="background:#f8f9fa; padding:20px; border-radius:8px; text-align:center; border:1px solid #ddd;">
                <span style="font-size:0.9rem;">累計貯金額</span>
                <span style="display:block; font-size:2.2rem; font-weight:bold; color:var(--primary-btn);" id="grandTotal">0円</span>
            </div>
            <div style="padding:15px 0;">
                <div style="display:flex; justify-content:space-between; font-size:0.8rem; font-weight:bold;">
                    <span>目標：<span id="displayTarget">0</span>円</span>
                    <span>あと <span id="displayRemaining">0</span>円</span>
                </div>
                <div class="progress-container"><div class="progress-bar" id="progressBar"></div></div>
            </div>
            <button class="btn-sub" onclick="showPage('page1')">戻る</button>
        </div>

        <div id="page4" class="hidden">
            <div style="margin-bottom:20px;">
                <label style="font-size:0.8rem; font-weight:bold;">🎯 目標金額を設定</label>
                <div style="display:flex; gap:10px; margin-top:5px;">
                    <input type="number" id="targetInput" style="flex:1; padding:12px; border:1px solid #ddd; border-radius:6px;">
                    <button class="btn-main" onclick="updateTarget()" style="width:auto; margin:0; padding:10px;">設定</button>
                </div>
            </div>
            <div style="margin-bottom:20px;">
                <label style="font-size:0.8rem; font-weight:bold;">＋ 固定ボタン追加</label>
                <input type="text" id="newBtnName" placeholder="名前" style="width:100%; padding:12px; margin-top:5px; border:1px solid #ddd; border-radius:6px;">
                <input type="number" id="newBtnAmount" placeholder="金額" style="width:100%; padding:12px; margin-top:5px; border:1px solid #ddd; border-radius:6px;">
                <button class="btn-main" onclick="addQuickButton()">追加</button>
            </div>
            <div id="manageListArea"></div>
            <button class="btn-sub" onclick="showPage('page1')">戻る</button>
        </div>

        <div id="page5" class="hidden">
            <div style="display:flex; gap:5px; margin-bottom:15px;">
                <button class="btn-tab" onclick="renderHistory('day')">今日</button>
                <button class="btn-tab" onclick="renderHistory('week')">1週</button>
                <button class="btn-tab" onclick="renderHistory('month')">1月</button>
            </div>
            <div id="historyListArea" style="height:320px; overflow-y:auto; border:1px solid #eee; background:#fff; border-radius:8px;"></div>
            <button class="btn-sub" onclick="showPage('page1')" style="margin-top:20px;">戻る</button>
        </div>
    </div>
</div>

<script>
    let total = parseInt(localStorage.getItem('mySavingTotal')) || 0;
    let targetAmount = parseInt(localStorage.getItem('myTargetAmount')) || 0;
    let history = JSON.parse(localStorage.getItem('mySavingHistory')) || [];
    let quickButtons = JSON.parse(localStorage.getItem('myQuickButtons')) || [{ name: 'スタバ', amount: 650 }, { name: 'コンビニ', amount: 300 }];

    function showPage(pageId) {
        const ids = ['page1', 'page2', 'page3', 'page4', 'page5'];
        ids.forEach(id => document.getElementById(id).classList.add('hidden'));
        document.getElementById(pageId).classList.remove('hidden');
        if(pageId === 'page1') updateDonut();
        if(pageId === 'page3') updateProgressUI();
        if(pageId === 'page4') renderManageList();
        if(pageId === 'page5') renderHistory('day');
    }

    function updateDonut() {
        document.getElementById('donutTotal').innerText = total.toLocaleString() + "円";
        let percent = targetAmount > 0 ? Math.min(100, Math.floor((total / targetAmount) * 100)) : 0;
        document.getElementById('donutPercent').innerText = "達成率 " + percent + "%";
        const circle = document.getElementById('donutCircle');
        const offset = 251.2 - (percent / 100 * 251.2);
        circle.style.strokeDashoffset = offset;
        renderQuickButtons();
    }

    // ★自由記入データの保存処理
    function saveManualData() {
        const name = document.getElementById('manualName').value;
        const amt = parseInt(document.getElementById('manualAmount').value);
        if(!name || isNaN(amt)) {
            alert("名前と金額を両方入れてくださいね！");
            return;
        }
        saveData(name, amt);
        // 入力欄を空にする
        document.getElementById('manualName').value = "";
        document.getElementById('manualAmount').value = "";
    }

    function saveData(name, amt) {
        total += amt;
        history.unshift({ name, amount: amt, timestamp: new Date().getTime() });
        localStorage.setItem('mySavingTotal', total);
        localStorage.setItem('mySavingHistory', JSON.stringify(history));
        document.getElementById('saveMsgBody').innerText = name + " (" + amt + "円)";
        showPage('page2');
    }

    function updateTarget() {
        targetAmount = parseInt(document.getElementById('targetInput').value) || 0;
        localStorage.setItem('myTargetAmount', targetAmount);
        alert("目標を設定しました");
        showPage('page1');
    }

    function updateProgressUI() {
        document.getElementById('grandTotal').innerText = total.toLocaleString() + "円";
        document.getElementById('displayTarget').innerText = targetAmount.toLocaleString();
        document.getElementById('displayRemaining').innerText = (Math.max(0, targetAmount - total)).toLocaleString();
        const percent = targetAmount > 0 ? Math.min(100, Math.floor((total / targetAmount) * 100)) : 0;
        document.getElementById('progressBar').style.width = percent + "%";
    }

    function renderHistory(period) {
        const now = new Date();
        const filtered = history.filter(i => {
            const d = new Date(i.timestamp);
            if(period === 'day') return d.toDateString() === now.toDateString();
            if(period === 'week') return i.timestamp >= (now.getTime() - 7*24*60*60*1000);
            return i.timestamp >= (now.getTime() - 30*24*60*60*1000);
        });
        const area = document.getElementById('historyListArea');
        area.innerHTML = filtered.map(i => `
            <div class="history-item">
                <div class="item-info"><span class="item-date">${new Date(i.timestamp).toLocaleString('ja-JP',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'})}</span><span class="item-name">${i.name}</span></div>
                <div><span style="color:var(--primary-btn);font-weight:bold;">+${i.amount}円</span> <button class="btn-del-mini" onclick="deleteItem(${i.timestamp})">✕</button></div>
            </div>
        `).join('') || '<p style="text-align:center; color:#ccc; margin-top:50px;">記録なし</p>';
    }

    function deleteItem(ts) {
        const idx = history.findIndex(i => i.timestamp === ts);
        if(idx > -1) {
            total -= history[idx].amount;
            history.splice(idx, 1);
            localStorage.setItem('mySavingTotal', total);
            localStorage.setItem('mySavingHistory', JSON.stringify(history));
            renderHistory('day');
        }
    }

    function renderQuickButtons() {
        document.getElementById('quickButtonsArea').innerHTML = quickButtons.map(btn => `<div class="btn-quick" onclick="saveData('${btn.name}', ${btn.amount})">${btn.name}<span>${btn.amount}円</span></div>`).join('');
    }

    function renderManageList() {
        document.getElementById('manageListArea').innerHTML = quickButtons.map((btn, idx) => `<div style="display:flex; justify-content:space-between; padding:8px; border-bottom:1px solid #eee;"><span>${btn.name}</span><button onclick="delBtn(${idx})" style="width:auto; padding:2px 8px;">削除</button></div>`).join('');
    }

    function addQuickButton() {
        const n = document.getElementById('newBtnName').value;
        const a = parseInt(document.getElementById('newBtnAmount').value);
        if(n && a) { quickButtons.push({name:n, amount:a}); localStorage.setItem('myQuickButtons', JSON.stringify(quickButtons)); document.getElementById('newBtnName').value=""; document.getElementById('newBtnAmount').value=""; renderManageList(); }
    }

    function delBtn(idx) { quickButtons.splice(idx, 1); localStorage.setItem('myQuickButtons', JSON.stringify(quickButtons)); renderManageList(); }

    showPage('page1');
</script>
</body>
</html>
